<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="StudentMS – School Student Management System" />
<title>StudentMS – Student Management System</title>
<link rel="stylesheet" href="assets/css/style.css" />
<link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg" />
<style>
  .splash {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    background: var(--bg);
  }
  .splash-logo {
    font-size: 64px;
    animation: pulse 2s ease-in-out infinite;
  }
  .splash-title {
    font-family: var(--font-display);
    font-size: 2rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--indigo2), var(--violet));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .splash-sub {
    font-size: 14px;
    color: var(--muted);
  }
  .splash-spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--surface3);
    border-top-color: var(--indigo);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-top: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
</style>
</head>
<body>
<div class="splash">
  <div class="splash-logo">🎓</div>
  <div class="splash-title">StudentMS</div>
  <div class="splash-sub">School Student Management System</div>
  <div class="splash-spinner"></div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>

<script src="assets/js/firebase/config.js"></script>
<script src="assets/js/utils/helpers.js"></script>
<script src="assets/js/utils/security.js"></script>
<script src="assets/js/services/auth.service.js"></script>

<script>
'use strict';
initFirebase();
initTheme();

// Smart redirect: authenticated → dashboard, else → login
AuthService.onAuthStateChanged((user) => {
  if (user) {
    window.location.replace('dashboard.html');
  } else {
    window.location.replace('login.html');
  }
});

// Fallback in case Firebase takes too long
setTimeout(() => {
  window.location.replace('login.html');
}, 4000);
</script>
</body>
</html>
